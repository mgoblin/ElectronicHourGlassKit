name: Build Lazarus EGHK UI Editor

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest  # Also supports windows-latest and macos-latest

    steps:
    - uses: actions/checkout@v3
    - uses: sxmxta/lazarus@v1.0.18
      with:
        lazarus-version: "2.2.6"
        include-packages: "LazTestInsight"
        with-cache: false
        
    - run: lazbuild src/utils/ui_editor/lazarus/led_control/ledcontrol.lpk
    - run: ls -la /usr/share/lazarus/2.2.6/components/fpcunit/lib/x86_64-linux/gtk2
    - run: make -C src/utils/ui_editor/lazarus/led_control/test all
    # - run: src/utils/ui_editor/lazarus/led_control/test/led_unittests --all --format=XML --file=result.xml
